openapi: 3.0.3

tags:
  - name: Settings
    description: Team email configuration & global settings

paths:
  /api/settings:
    get:
      summary: Get current team email settings
      tags: [Settings]
      description: Retrieve the current mapping of teams to email addresses used for feedback notifications.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  statusCode:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      teamEmails:
                        type: object
                        additionalProperties:
                          type: string
                          format: email
                        example:
                          engineering: 'eng@company.com'
                          product: 'product@company.com'
                          support: 'support@company.com'
                          billing: 'billing@company.com'
                          design: 'design@company.com'
                          security: 'security@company.com'
        '500':
          description: Server error

  /api/settings/update-settings:
    patch:
      summary: Update team email settings
      tags: [Settings]
      description: Update the email addresses assigned to each team. Only provided fields will be updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                teamEmails:
                  type: object
                  additionalProperties:
                    type: string
                    format: email
                  example:
                    engineering: 'eng@company.com'
                    product: 'product@company.com'
                    support: 'support@company.com'
                    billing: 'billing@company.com'
                    design: 'design@company.com'
                    security: 'security@company.com'
              example:
                teamEmails:
                  engineering: 'new-eng@company.com'
                  support: 'help@company.com'
      responses:
        '200':
          description: Settings updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  statusCode:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      teamEmails:
                        type: object
                        additionalProperties:
                          type: string
                          format: email
        '400':
          description: Validation error (invalid email format, etc.)
        '500':
          description: Server error
